name = "fasttackle"
pages_build_output_dir = "dist"
compatibility_date = "2024-09-23"
# nodejs_compat is required by pg (used inside @prisma/adapter-pg) for its
# Node net/tls/events polyfills â€” without it the Worker throws on import.
compatibility_flags = ["nodejs_compat"]

# Hyperdrive proxies/pools the connection to Supabase Postgres so the Worker
# doesn't open a raw TCP connection per request. Create it once with:
#   npx wrangler hyperdrive create change-art-gallery-db \
#     --connection-string="<your Supabase DATABASE_URL>"
# then paste the id it prints below (or set it via the Cloudflare dashboard â€”
# Pages project > Settings > Functions > Hyperdrive bindings â€” which is the
# only way to attach it to a *Pages* project on some wrangler versions).
[[hyperdrive]]
binding = "HYPERDRIVE"
id = "09a2f01f894543b9a073951bfe955c96"

# Non-secret vars. Secrets (JWT_SECRET, DATABASE_URL) are NOT set here â€”
# see the env var table in the task 5 report for where each one goes.
[vars]
NODE_ENV = "production"
CORS_ORIGIN = "https://fasttackle.pages.dev"

# Preview deployments (PRs / non-production branches) get their own vars so
# NODE_ENV can stay "development" (surfaces verificationCode in register
# responses) and CORS_ORIGIN can allow the *.pages.dev preview origin.
[env.preview.vars]
NODE_ENV = "development"
CORS_ORIGIN = "*"

[[env.preview.hyperdrive]]
binding = "HYPERDRIVE"
id = "09a2f01f894543b9a073951bfe955c96"
